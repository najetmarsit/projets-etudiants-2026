name: flutter_patient_app
description: Clinova — application patient (Flutter), connectée à l'API Clinova.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.1.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  open_filex: ^4.4.0
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
