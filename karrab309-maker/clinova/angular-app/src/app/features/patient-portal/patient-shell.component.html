<div class="mh-patient-shell" [class.rtl]="translate.isRtl()">
  <header class="mh-patient-topbar d-md-none">
    <div class="mh-patient-topbar-start">
      <i class="bi bi-heart-pulse-fill" aria-hidden="true"></i>
      <span>{{ 'APP.TITLE' | translate }}</span>
    </div>
    <button
      type="button"
      class="mh-patient-topbar-btn"
      (click)="theme.toggleDark()"
      [attr.aria-pressed]="theme.isDark()"
      [attr.aria-label]="theme.isDark() ? ('COMMON.THEME_LIGHT' | translate) : ('COMMON.THEME_DARK' | translate)"
    >
      <i class="bi" [class.bi-moon-stars-fill]="!theme.isDark()" [class.bi-sun-fill]="theme.isDark()"></i>
    </button>
  </header>
  <main class="mh-patient-main">
    <router-outlet />
  </main>
  <nav class="mh-bottom-nav mh-bottom-nav--patient d-md-none" [attr.aria-label]="'PATIENT.NAV_LABEL' | translate">
    <a routerLink="/patient/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <i class="bi bi-house-heart-fill" aria-hidden="true"></i>
      <span>{{ 'MOBILE_NAV.PATIENT_HOME' | translate }}</span>
    </a>
    <a routerLink="/patient/appointments" routerLinkActive="active">
      <i class="bi bi-calendar-heart-fill" aria-hidden="true"></i>
      <span>{{ 'MOBILE_NAV.PATIENT_APPOINTMENTS' | translate }}</span>
    </a>
    <a routerLink="/patient/dossier" routerLinkActive="active">
      <i class="bi bi-file-medical-fill" aria-hidden="true"></i>
      <span>{{ 'MOBILE_NAV.PATIENT_RECORD' | translate }}</span>
    </a>
    <a routerLink="/patient/payments" routerLinkActive="active">
      <i class="bi bi-wallet2" aria-hidden="true"></i>
      <span>{{ 'MOBILE_NAV.PATIENT_PAYMENTS' | translate }}</span>
    </a>
    <a routerLink="/patient/notifications" routerLinkActive="active">
      <i class="bi bi-bell-fill" aria-hidden="true"></i>
      <span>{{ 'MOBILE_NAV.PATIENT_ALERTS' | translate }}</span>
    </a>
  </nav>
</div>
<app-chatbot-widget />
